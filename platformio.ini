; PlatformIO project config
; - Arduino Uno (atmega328p)
; - 두 개의 스케치를 환경(env)으로 분리:
;     [env:cart]       메인 통합 스케치 (firmware/capstone-rfid-cart/)
;     [env:uid-reader] NTAG213 UID 리더 보조 스케치 (firmware/uid-reader/)
;
; 사용법 (VSCode PlatformIO):
;   - 좌측 PlatformIO 탭 → Project Tasks → 원하는 env 선택 → Build / Upload / Monitor
;   - 또는 하단 상태바에서 환경(env)을 cart / uid-reader 로 전환 후 ▶ Build / 화살표 Upload
;   - Serial Monitor: 콘센트 모양 아이콘 또는 Ctrl+Alt+S

[platformio]
src_dir = firmware

[env]
platform = atmelavr
board    = uno
framework = arduino
monitor_speed = 9600
lib_deps =
    miguelbalboa/MFRC522@^1.4.11
    marcoschwartz/LiquidCrystal_I2C@^1.1.4

[env:cart]
build_src_filter = +<capstone-rfid-cart/> -<uid-reader/>

[env:uid-reader]
build_src_filter = +<uid-reader/> -<capstone-rfid-cart/>
